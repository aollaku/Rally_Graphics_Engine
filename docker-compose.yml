services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rally-graphics-nginx
    restart: unless-stopped
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    ports:
      - "8443:443"
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    image: rally-graphics-djames:ha-ssl
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      INSTANCE_ID: "app1"
      PORT: "3000"
      DEFAULT_EVENT_ID: "757"
      CACHE_TTL_MS: "15000"
      PUBLIC_TOKEN: ""
      SESSION_SECRET: "change_this_to_a_long_random_value"
      DEFAULT_ADMIN_USER: "superadmin"
      DEFAULT_ADMIN_PASSWORD: "superadmin123"
      DATABASE_URL: "postgres://rally:rally_password@postgres:5432/rally_graphics"
      BACKUP_DIR: "/backups"
    volumes:
      - backups_data:/backups
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app2:
    image: rally-graphics-djames:ha-ssl
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      app1:
        condition: service_healthy
    environment:
      INSTANCE_ID: "app2"
      PORT: "3000"
      DEFAULT_EVENT_ID: "757"
      CACHE_TTL_MS: "15000"
      PUBLIC_TOKEN: ""
      SESSION_SECRET: "change_this_to_a_long_random_value"
      DEFAULT_ADMIN_USER: "superadmin"
      DEFAULT_ADMIN_PASSWORD: "superadmin123"
      DATABASE_URL: "postgres://rally:rally_password@postgres:5432/rally_graphics"
      BACKUP_DIR: "/backups"
    volumes:
      - backups_data:/backups
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: rally-graphics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rally_graphics
      POSTGRES_USER: rally
      POSTGRES_PASSWORD: rally_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rally -d rally_graphics"]
      interval: 5s
      timeout: 5s
      retries: 20

  backup:
    image: postgres:16-alpine
    container_name: rally-graphics-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://rally:rally_password@postgres:5432/rally_graphics"
      BACKUP_RETENTION_DAYS: "14"
      BACKUP_INTERVAL_SECONDS: "86400"
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backups_data:/backups
    command: ["/bin/sh", "/backup.sh"]

volumes:
  postgres_data:
  backups_data:
