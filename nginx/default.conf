upstream rally_app {
    ip_hash;
    server app1:3000 max_fails=3 fail_timeout=10s;
    server app2:3000 max_fails=3 fail_timeout=10s;
}

# HTTP is only for the programme graphics output and the assets/API it needs.
# Controller, tablet, login, admin and database tools are HTTPS-only.
server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location = /output { proxy_pass http://rally_app; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto http; }
    location = /output/live { proxy_pass http://rally_app; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto http; }
    location = /preview { proxy_pass http://rally_app; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto http; }
    location = /preview/live { proxy_pass http://rally_app; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto http; }
    location = /graphics.css { proxy_pass http://rally_app; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto http; }
    location = /graphics.js { proxy_pass http://rally_app; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto http; }

    # Public logo/assets used by the HTTP preview and programme output.
    # Without this, uploaded PNG logos work inside the HTTPS controller preview
    # but show as a broken image on /preview and /output.
    location ^~ /uploads/logos/ {
        proxy_pass http://rally_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto http;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location /socket.io/ {
        proxy_pass http://rally_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Public read-only endpoints required by /output/live.
    location = /api/state { proxy_pass http://rally_app; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto http; }
    location ~ ^/api/event/[^/]+/(overall|entries)$ { proxy_pass http://rally_app; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto http; }
    location ~ ^/api/event/[^/]+/stage/[0-9]+$ { proxy_pass http://rally_app; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto http; }

    location / {
        return 403;
    }
}

# HTTPS-only control plane.
server {
    listen 443 ssl http2;
    server_name _;
    client_max_body_size 50m;

    ssl_certificate /etc/nginx/certs/rally-graphics.crt;
    ssl_certificate_key /etc/nginx/certs/rally-graphics.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location /healthz {
        proxy_pass http://rally_app;
        proxy_http_version 1.1;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
    }

    location /socket.io/ {
        proxy_pass http://rally_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
    }

    # Programme output remains HTTP-only. Preview is allowed on both HTTPS (controller iframe) and HTTP (external preview window).
    location = /output { return 403; }
    location = /output/live { return 403; }

    location / {
        proxy_pass http://rally_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
    }
}
