# MediaMTX for RGE Broadcast Engine
# Receive RTMP/SRT/RTSP/WebRTC and redistribute as RTMP, RTSP, HLS, WebRTC or SRT.

logLevel: info
api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554

rtmp: yes
rtmpAddress: :1935

hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: lowLatency

webrtc: yes
webrtcAddress: :8889

srt: yes
srtAddress: :8890

paths:
  # Main incoming video stream. Publish to one of these:
  # RTMP: rtmp://SERVER_IP:1935/live
  # SRT:  srt://SERVER_IP:8890?streamid=publish:live&mode=caller
  # RTSP: rtsp://SERVER_IP:8554/live
  live:
    source: publisher

  # RGE graphics-only program generated by the app/FFmpeg.
  rge_graphics:
    source: publisher

  # Any extra path name is accepted dynamically.
  all_others:
    source: publisher
