<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Rally Graphics - Tablet Controller</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="tablet-controller tablet-v2">
  <main class="tablet2Shell">
    <header class="tablet2Header">
      <div class="tablet2Title">EVENT I.D. SELECTION</div>
      <div class="tablet2EventRow">
        <input id="eventId" class="tablet2IdBox tablet2EventIdInput" type="number" inputmode="numeric" min="1" step="1" value="757" placeholder="Event I.D." aria-label="Event I.D.">
        <div id="eventNameDisplay" class="tablet2EventName">DISPLAY EVENT NAME HERE</div>
        <button id="saveEvent" class="tablet2Refresh" title="Load / refresh event data">↻</button>
      </div>
    </header>

    <section class="tablet2TopGrid">
      <div class="tablet2PreviewBlock">
        <h3>GFX PREVIEW MONITOR</h3>
        <div class="tablet2PreviewMonitor">
          <iframe id="previewFrame" title="GFX preview monitor"></iframe>
          <div id="tabletLogoPreviewOverlay" class="tablet2LogoPreviewOverlay" aria-hidden="true"><img id="tabletLogoPreviewImg" alt="Logo preview"></div>
          <div id="tabletPreviewEmpty" class="tablet2PreviewEmpty">THUMBNAIL<br>PREVIEW<br>OF GFX</div>
        </div>
      </div>

      <div class="tablet2LogoBlock">
        <h3>LOGO</h3>
        <div class="tablet2LogoGrid">
          <button id="takeBug" class="tablet2Btn greenBtn">TAKE<br>BUG</button>
          <button id="takeToPgm" class="tablet2Btn redBtn">TAKE<br>TO PGM</button>
          <button class="tablet2Btn logoSlot" data-logo-slot="1">1</button>
          <button class="tablet2Btn logoSlot" data-logo-slot="2">2</button>
          <button id="clearGraphic" class="tablet2Btn clearBtn">CLEAR<br>PGM</button>
          <button id="clearPreview" class="tablet2Btn clearPreviewBtn">CLEAR<br>PREVIEW</button>
        </div>
      </div>
    </section>

    <section class="tablet2Panel gfxPanel">
      <h3>GFX SELECTOR</h3>
      <div class="tablet2GfxGrid">
        <button data-type="entries">ENTRY<br>LIST</button>
        <button data-type="stage">STAGE<br>RES<br>(FULL)</button>
        <button data-type="stageTimes">STAGE<br>RES<br>(SMALL)</button>
        <button data-type="overall">O/A<br>LEADER<br>BOARD</button>
      </div>
    </section>

    <section class="tablet2Panel">
      <h3>STAGE SELECTOR</h3>
      <div id="stageButtons" class="tablet2NumberGrid"></div>
    </section>

    <section class="tablet2Panel pagePanel">
      <div class="tablet2PageTitleRow">
        <button id="allAutoPages" class="autoBtn">ALL [AUTO]</button>
        <h3>PAGE SELECTOR</h3>
      </div>
      <div id="pageButtons" class="tablet2NumberGrid pageButtons"></div>
    </section>

    <footer class="tablet2Footer">
      <span id="eventInfo">Choose a GFX, stage and page. Preview appears here first, then press TAKE TO PGM.</span>
      <input id="outputUrl" readonly>
    </footer>

    <input id="pageSize" type="hidden" value="10">
    <select id="stageSelect" hidden></select>
    <span id="pageNo" class="hiddenText">Page 1</span>
    <span id="totalRows" class="hiddenText">-- rows</span>
  </main>
<script src="/socket.io/socket.io.js"></script>
<script src="/controller.js?v=16"></script>
</body>
</html>
